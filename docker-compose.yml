version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: studyflow_db
    environment:
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow_secret
      POSTGRES_DB: studyflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: studyflow_redis
    ports:
      - "6379:6379"
volumes:
  postgres_data:
