<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse" x2="200" y2="0">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="42" fill="url(#bg)"/>

  <!-- Subtle purple haze -->
  <circle cx="100" cy="80" r="80" fill="rgba(124,106,247,0.08)"/>

  <!-- Track ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="9"/>

  <!-- Progress arc — 3/4 filled (circumference ≈ 390, 3/4 ≈ 292) -->
  <circle cx="100" cy="100" r="62" fill="none"
    stroke="url(#arc)" stroke-width="9" stroke-linecap="round"
    stroke-dasharray="292 98"
    transform="rotate(-90 100 100)"
    filter="url(#glow)"/>

  <!-- End dot (green) -->
  <circle cx="100" cy="38" r="5" fill="#10b981" transform="rotate(180 100 100)" filter="url(#glow)"/>

  <!-- Lightning bolt — centered at 100,100 -->
  <path d="M108 63 L83 105 H99 L89 141 L118 97 H102 Z"
    fill="white" opacity="0.95" filter="url(#softglow)"/>
</svg>
